[manager]
cwd = { fg = "#ebbcba" }

# Hovered
hovered = { fg = "#191724", bg = "#c4a7e7" }
preview_hovered = { underline = true }

# Find
find_keyword  = { fg = "#191724", bg = "#ebbcba" }
find_position = { fg = "magenta", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "#191724", bg = "#ebbcba" }
marker_copied  = { fg = "#191724", bg = "#9ccfd8" }
marker_cut = { fg = "#e0def4", bg ="#eb6f92" }

# Tab
tab_active    = { fg = "#908caa", bg = "#26233a" }
tab_inactive  = { fg = "#6e6a86", bg = "#1f1d2e" }
tab_width    = 1

# Border
border_symbol = "│"
border_style  = { fg = "gray" }

# Offset
folder_offset  = [ 1, 0, 1, 0 ]
preview_offset = [ 1, 1, 1, 1 ]

# Highlighting
syntect_theme = "~/.config/bat/themes/rose-pine.tmTheme"

# : }}}


# : Status {{{

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#26233a", bg = "#26233a" }

# Mode
mode_normal = { fg = "black", bg = "lightblue", bold = true }
mode_select = { fg = "black", bg = "lightgreen", bold = true }
mode_unset  = { fg = "black", bg = "lightmagenta", bold = true }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "blue", bg = "black" }
progress_error  = { fg = "red", bg = "black" }

# Permissions
permissions_t = { fg = "#9ccfd8" }
permissions_r = { fg = "#f6c177" }
permissions_w = { fg = "#eb6f92" }
permissions_x = { fg = "lightcyan" }
permissions_s = { fg = "darkgray" }

# : }}}


# : Input {{{

[input]
border   = { fg = "blue" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Select {{{

[select]
border   = { fg = "blue" }
active   = { fg = "magenta" }
inactive = {}

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "blue" }
title   = {}
hovered = { underline = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "black" }
cand            = { fg = "lightcyan" }
rest            = { fg = "darkgray" }
desc            = { fg = "magenta" }
separator       = "  "
separator_style = { fg = "darkgray" }

# : }}}


# : Help {{{

[help]
on      = { fg = "magenta" }
exec    = { fg = "cyan" }
desc    = { fg = "gray" }
hovered = { bg = "darkgray", bold = true }
footer  = { fg = "black", bg = "white" }

# : }}}[tab]
active    = { fg = "#908caa", bg = "#26233a" }
inactive  = { fg = "#6e6a86", bg = "#1f1d2e" }
max_width = 1
