[filetype]

rules = [
	# Images
	{ mime = "image/*", fg = "#ebbcba" },

	# Videos
	{ mime = "video/*", fg = "#f6c177" },
	{ mime = "audio/*", fg = "#f6c177" },

	# Archives
	{ mime = "application/zip", fg = "#908caa" },
	{ mime = "application/gzip", fg = "#908caa" },
	{ mime = "application/x-tar", fg = "#908caa" },
	{ mime = "application/x-bzip", fg = "#908caa" },
	{ mime = "application/x-bzip2", fg = "#908caa" },
	{ mime = "application/x-7z-compressed", fg = "#908caa" },
	{ mime = "application/x-rar", fg = "#908caa" },

	# Fallback
	{ name = "*", fg = "#e0def4" },
	{ name = "*/", fg = "#c4a7e7" }
]

